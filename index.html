<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta charset="UTF-8">
<title>秦岭旅游地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="search-wrapper">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索景点/设施名称">
    <button id="searchBtn">搜索</button>
  </div>
  <div id="searchResult"></div>
</div>

<div id="map"></div>

<div class="top-tools">
  <button onclick="switchNormal()">普通地图</button>
  <button onclick="switchSatellite()">卫星地图</button>
</div>

<div class="panel-container">
  <button class="panel-toggle" onclick="togglePanel('storyPanel')">📖 地图故事</button>
  <div class="panel-content" id="storyPanel">
    <button onclick="prevStory()">⬅️ 上一个景点</button>
    <button onclick="nextStory()">➡️ 下一个景点</button>
  </div>
  <button class="panel-toggle" onclick="togglePanel('filterPanel')">🔍 景区筛选</button>
  <div class="panel-content" id="filterPanel">
    <button onclick="show5A()">5A</button>
    <button onclick="show4A()">4A</button>
    <button onclick="show3A()">3A</button>
    <button onclick="clearHighLight()">清除</button>
  </div>
  <button class="panel-toggle" onclick="togglePanel('namePanel')">🏷️ 服务设施名称</button>
  <div class="panel-content" id="namePanel">
    <button onclick="toggleServiceLabel()">📄 显示 / 隐藏名称</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="main.js"></script>

</body>
</html>
